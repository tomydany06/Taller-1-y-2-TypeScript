<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Series</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid">

        <div class="d-flex align-items-center p-2 mb-3" style="background-color: #008B8B;">
            <img src="https://img.icons8.com/color/32/000000/tv-show.png" alt="TV Icon" class="mr-2">
            <h5 class="text-white m-0">TV Series</h5>
        </div>

        <div class="row">
            <div class="col-md-6">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Channel</th>
                            <th>Seasons</th>
                        </tr>
                    </thead>
                    <tbody id="series">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4">
                                <p class="mb-0">Seasons average: <span id="seasons-average">0</span></p>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="col-md-4">
                <div id="serie-detail"></div>
            </div>
        </div>

    </div>

    <script type="module" src="./dist/serie.js"></script>
    <script type="module" src="./dist/data.js"></script>
    <script type="module" src="./dist/main.js"></script>
</body>

</html>
